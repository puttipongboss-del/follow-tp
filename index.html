<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modern Work Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>

    body{
      background:#f1f5f9;
      color:#1e293b;
      font-family:Arial,sans-serif;
      overflow-x:hidden;
    }

    .glass{
      background:#ffffff;
      border:1px solid #e2e8f0;
      box-shadow:0 2px 12px rgba(15,23,42,0.06);
    }

    .sidebar{
      position:fixed;
      left:0;
      top:0;
      width:240px;
      height:100vh;
      background:#ffffff;
      border-right:1px solid #e2e8f0;
      padding:30px 20px;
      z-index:100;
    }

    .sidebar-title{
      font-size:24px;
      font-weight:bold;
      margin-bottom:30px;
      color:#0f172a;
    }

    .menu-btn{
      width:100%;
      background:#f8fafc;
      border:1px solid #e2e8f0;
      color:#334155;
      padding:14px;
      margin-bottom:12px;
      border-radius:14px;
      cursor:pointer;
      transition:0.2s;
      text-align:left;
      font-weight:bold;
    }

    .menu-btn:hover{
      background:#e2e8f0;
    }

    .menu-btn.active{
      background:#0ea5e9;
      color:#ffffff;
      border-color:#0ea5e9;
    }

    .main-content{
      margin-left:240px;
      padding:30px;
    }

    .status-badge{
      padding:6px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:bold;
    }

    /* ── Status Badges (light mode) ── */

    .waiting{
      background:rgba(234,88,12,0.1);
      color:#c2410c;
      border:1px solid rgba(234,88,12,0.25);
    }

    .in-progress{
      background:rgba(79,70,229,0.1);
      color:#4338ca;
      border:1px solid rgba(79,70,229,0.25);
    }

    .review{
      background:rgba(2,132,199,0.1);
      color:#0369a1;
      border:1px solid rgba(2,132,199,0.25);
    }

    .blocked{
      background:rgba(220,38,38,0.1);
      color:#b91c1c;
      border:1px solid rgba(220,38,38,0.25);
    }

    .completed{
      background:rgba(22,163,74,0.1);
      color:#15803d;
      border:1px solid rgba(22,163,74,0.25);
    }

    /* ── KPI Cards accent ── */
    .kpi-total   { border-left:4px solid #38bdf8; }
    .kpi-progress{ border-left:4px solid #818cf8; }
    .kpi-done    { border-left:4px solid #4ade80; }
    .kpi-wait    { border-left:4px solid #fb923c; }

    /* ── Table row highlight ── */
    tbody tr td:first-child { border-left: 3px solid transparent; }
    tbody tr:hover td:first-child { border-left: 3px solid #818cf8; }

    /* ── Subtle header upgrade ── */
    thead th {
      font-size:11px;
      letter-spacing:0.08em;
      text-transform:uppercase;
      color:#94a3b8;
      border-bottom:1px solid #e2e8f0;
      padding-bottom:10px;
    }

    /* ── Sidebar member avatars ── */
    .menu-btn .avatar{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:26px;
      height:26px;
      border-radius:50%;
      font-size:14px;
      margin-right:6px;
    }
      height:10px;
      border-radius:999px;
      background:#22d3ee;
    }

    table{
      border-collapse:separate;
      border-spacing:0 12px;
    }

    tbody tr{
      background:#f8fafc;
      transition:0.2s;
    }

    tbody tr:hover{
      background:#f1f5f9;
    }

    
    .clickable-card{
      cursor:pointer;
      transition:0.25s;
    }

    .clickable-card:hover{
      transform:translateY(-4px);
      border-color:#22d3ee;
    }

    .modal{
      display:none;
      position:fixed;
      z-index:9999;
      left:0;
      top:0;
      width:100%;
      height:100%;
      background:rgba(15,23,42,0.5);
      padding:20px;
    }

    .modal-content{
      background:#ffffff;
      width:90%;
      max-width:900px;
      margin:40px auto;
      border-radius:24px;
      border:1px solid #e2e8f0;
      padding:24px;
      max-height:85vh;
      overflow-y:auto;
      color:white;
      box-shadow:0 10px 40px rgba(0,0,0,0.5);
    }

    .modal-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .close-modal{
      font-size:32px;
      cursor:pointer;
      color:#64748b;
    }

    .close-modal:hover{
      color:white;
    }

    .detail-card{
      background:#f8fafc;
      border:1px solid #e2e8f0;
      border-radius:18px;
      padding:18px;
      margin-bottom:14px;
    }

    .detail-note{
      margin-top:10px;
      color:#92400e;
      background:rgba(251,191,36,0.15);
      padding:10px;
      border-radius:12px;
    }


    @media(max-width:1024px){

      .sidebar{
        width:100%;
        height:auto;
        position:relative;
      }

      .main-content{
        margin-left:0;
      }

    }

  </style>

</head>

<body>

  <!-- SIDEBAR -->

  <div class="sidebar">

    <div class="sidebar-title">
      WORK DASHBOARD
    </div>

    <button class="menu-btn active" onclick="filterTeam('ALL', this)">
      📊 Overview
    </button>

    <button class="menu-btn" onclick="filterTeam('BOSS', this)">
      🐯 BOSS
    </button>

    <button class="menu-btn" onclick="filterTeam('BUS', this)">
      🚌 BUS
    </button>

    <button class="menu-btn" onclick="filterTeam('NING', this)">
      🐋 NING
    </button>

    <button class="menu-btn" onclick="filterTeam('NON', this)">
      🐱 NON
    </button>

  </div>

  <!-- MAIN -->

  <div class="main-content">

    <!-- HEADER -->

    <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-4">

      <div>

        <h1 id="dashboardTitle" class="text-4xl font-bold" style="color:#0f172a">
          WORK STATUS DASHBOARD
        </h1>

        <p class="text-slate-500 mt-2">
          Production & Engineering Task Tracking
        </p>

      </div>

      <div class="glass rounded-2xl px-5 py-3">

        <p class="text-slate-500 text-sm font-medium">
          Last Update
        </p>

        <p id="lastUpdate" class="font-semibold" style="color:#1e293b"></p>

      </div>

    </div>

    <!-- KPI -->

    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-5 mb-8">

      <div class="glass rounded-3xl p-6 clickable-card kpi-total" onclick="showStatusDetail('ALL')">

        <p class="text-slate-500 text-sm font-medium">
          TOTAL TASKS
        </p>

        <h2 id="totalTask" class="text-5xl font-bold mt-4" style="color:#0f172a">
          0
        </h2>

      </div>

      <div class="glass rounded-3xl p-6 clickable-card kpi-progress" onclick="showStatusDetail('INPROGRESS')">

        <p class="text-slate-500 text-sm font-medium">
          IN PROGRESS
        </p>

        <h2 id="inProgress" class="text-5xl font-bold mt-4" style="color:#0f172a">
          0
        </h2>

      </div>

      <div class="glass rounded-3xl p-6 clickable-card kpi-done" onclick="showStatusDetail('COMPLETED')">

        <p class="text-slate-500 text-sm font-medium">
          COMPLETED
        </p>

        <h2 id="completed" class="text-5xl font-bold mt-4" style="color:#0f172a">
          0
        </h2>

      </div>

      <div class="glass rounded-3xl p-6 clickable-card kpi-wait" onclick="showStatusDetail('WAITING')">

        <p class="text-slate-500 text-sm font-medium">
          WAITING
        </p>

        <h2 id="waiting" class="text-5xl font-bold mt-4" style="color:#0f172a">
          0
        </h2>

      </div>

    </div>

    <!-- MAIN GRID -->

    <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">

      <!-- TABLE -->

      <div class="xl:col-span-2 glass rounded-3xl p-6">

        <div class="flex justify-between items-center mb-6">

          <h2 class="text-2xl font-semibold" style="color:#0f172a">
            Task Overview
          </h2>

          <input
            type="text"
            id="searchInput"
            placeholder="Search..."
            class="bg-white border border-slate-300 rounded-xl px-4 py-2 outline-none text-slate-700"
          />

        </div>

        <div class="overflow-x-auto">

          <table class="w-full">

            <thead>

              <tr class="text-slate-400 text-sm text-left">

                  <th class="pb-3">TOPIC</th>
                  <th class="pb-3">ACTIVITY</th>
                  <th class="pb-3">MEMBER</th>
                  <th class="pb-3">START</th>
                  <th class="pb-3">END</th>
                  <th class="pb-3">LEADTIME</th>
                  <th class="pb-3">STATUS</th>

              </tr>

            </thead>

            <tbody id="taskTable"></tbody>

          </table>

        </div>

      </div>

      <!-- SIDE -->

      <div class="space-y-6">

        <!-- WORKLOAD -->

        <div class="glass rounded-3xl p-6">

          <h2 class="text-xl font-semibold mb-6">
            Team Workload
          </h2>

          <div id="workloadContainer" class="space-y-5"></div>

        </div>

        <!-- STATUS -->

        <div class="glass rounded-3xl p-6">

          <h2 class="text-xl font-semibold mb-5">
            Status Summary
          </h2>

          <div id="statusSummary" class="space-y-4"></div>

        </div>

      </div>

    </div>

  </div>

  
  <!-- DETAIL MODAL -->

  <div id="detailModal" class="modal">

    <div class="modal-content">

      <div class="modal-header">

        <h2 id="modalTitle" class="text-3xl font-bold" style="color:#0f172a">
          TASK DETAIL
        </h2>

        <span class="close-modal" onclick="closeModal()">
          &times;
        </span>

      </div>

      <div id="modalBody"></div>

    </div>

  </div>


  <script>

    const API_URL =
      "https://script.google.com/macros/s/AKfycbxVfyD_YfCHLNbrokqUflFZUs4mz6_76et9AVJlhOV9htMlnxQ8rezq_1rhF_7tPjc4/exec";

    let tasks = [];

    let currentTeam = 'ALL';

async function loadData(){

  try{

    const response =
      await fetch(API_URL);

    const json =
      await response.json();

    console.log(json);

    // IMPORTANT
    tasks = json.data || [];

    renderCurrentView();

  }catch(error){

    console.error("LOAD ERROR:", error);

  }
}

    function renderCurrentView(){

      let filtered = tasks;

      if(currentTeam !== 'ALL'){

        filtered =
          tasks.filter(t => t.TEAM === currentTeam);

      }

      renderDashboard(filtered);

      document.getElementById("dashboardTitle").innerText =
        currentTeam === 'ALL'
        ? 'WORK STATUS DASHBOARD'
        : `${currentTeam} DASHBOARD`;

    }

    function filterTeam(team, button){

      currentTeam = team;

      document
        .querySelectorAll('.menu-btn')
        .forEach(btn => btn.classList.remove('active'));

      button.classList.add('active');

      renderCurrentView();
    }

    function renderDashboard(data){

      document.getElementById("lastUpdate").innerText =
        new Date().toLocaleString();

      const total = data.length;

      const completed =
        data.filter(t => t.STATUS === "Completed").length;

      const waiting =
        data.filter(t =>
          t.STATUS === "Waiting" ||
          t.STATUS === "Blocked"
        ).length;

      const progress =
        data.filter(t =>
          t.STATUS === "Review" ||
          t.STATUS === "In Progress"
        ).length;

      document.getElementById("totalTask").innerText = total;
      document.getElementById("completed").innerText = completed;
      document.getElementById("waiting").innerText = waiting;
      document.getElementById("inProgress").innerText = progress;

      renderTable(data);
      renderWorkload(data);
      renderStatus(data);
    }

    function renderTable(data){

  const table =
    document.getElementById("taskTable");

  table.innerHTML = "";

  data.forEach(task => {

    const displayStatus =
      task.STATUS === "Blocked"
      ? "Waiting"
      : task.STATUS;

    const statusClass =
      displayStatus === "Waiting"     ? "waiting"     :
      displayStatus === "In Progress" ? "in-progress" :
      displayStatus === "Review"      ? "review"      :
      displayStatus === "Blocked"     ? "blocked"     :
      displayStatus === "Completed"   ? "completed"   :
      "review";

    table.innerHTML += `
      <tr>

        <td class="py-4 px-3 rounded-l-2xl font-medium" style="color:#1e293b">
          ${task.TOPIC || "-"}
        </td>

        <td class="px-3" style="color:#334155">
          ${task.ACTIVITY || "-"}
        </td>

        <td class="px-3" style="color:#334155">
          ${task.MEMBER || "-"}
        </td>

        <td class="px-3 text-slate-500 whitespace-nowrap">
          ${task.START || "-"}
        </td>

        <td class="px-3 text-slate-500 whitespace-nowrap">
          ${task.END || "-"}
        </td>

        <td class="px-3" style="color:#64748b">
          ${task["LEAD DAYS"] || 0} Days
        </td>

        <td class="px-3 rounded-r-2xl">

          <span class="status-badge ${statusClass}">
            ${displayStatus || "-"}
          </span>

        </td>

      </tr>
    `;
  });
}
    function renderWorkload(data){

      const workload = {};

      data.forEach(task => {

        const member = task.MEMBER || "Unknown";

        workload[member] =
          (workload[member] || 0) + 1;

      });

      const container =
        document.getElementById("workloadContainer");

      container.innerHTML = "";

      const barColors = [
        "#38bdf8","#818cf8","#4ade80","#fb923c","#f472b6","#facc15"
      ];

      let i = 0;
      Object.keys(workload).forEach(member => {

        const count  = workload[member];
        const total  = data.length || 1;
        const pct    = Math.round((count / total) * 100);
        const color  = barColors[i % barColors.length];
        i++;

        container.innerHTML += `

          <div>

            <div class="flex justify-between mb-2">

              <span style="font-weight:600;color:#334155">${member}</span>

              <span style="color:${color};font-weight:600">
                ${pct}%
              </span>

            </div>

            <div class="w-full h-3 bg-slate-200 rounded-full overflow-hidden">

              <div
                style="width:${pct}%;height:100%;border-radius:999px;background:${color};transition:width 0.6s ease"
              ></div>

            </div>

          </div>

        `;
      });
    }

    function renderStatus(data){

      const statusMap = {
        "In Progress": 0,
        Waiting: 0,
        Review: 0,
        Completed: 0
      };

      data.forEach(task => {
        const s = task.STATUS === "Blocked" ? "Waiting" : task.STATUS;
        if(statusMap[s] !== undefined){ statusMap[s]++; }
      });

      const colors = {
        "In Progress": "#4338ca",
        Waiting:       "#c2410c",
        Review:        "#0369a1",
        Completed:     "#15803d"
      };

      const dotColors = {
        "In Progress": "background:#4338ca",
        Waiting:       "background:#c2410c",
        Review:        "background:#0369a1",
        Completed:     "background:#15803d"
      };

      const container = document.getElementById("statusSummary");
      container.innerHTML = "";

      Object.keys(statusMap).forEach(status => {
        const col = colors[status] || "#94a3b8";
        const dot = dotColors[status] || "background:#94a3b8";
        container.innerHTML += `
          <div class="flex justify-between items-center py-1">
            <div class="flex items-center gap-3">
              <div style="width:10px;height:10px;border-radius:50%;${dot}"></div>
              <span style="color:#475569">${status}</span>
            </div>
            <span style="font-weight:700;color:${col}">${statusMap[status]}</span>
          </div>
        `;
      });
    }

    // SEARCH

    document
      .getElementById("searchInput")
      .addEventListener("input", function(e){

        const keyword =
          e.target.value.toLowerCase();

        let filtered = tasks;

        if(currentTeam !== 'ALL'){

          filtered =
            filtered.filter(t =>
              t.TEAM === currentTeam);

        }

        filtered =
          filtered.filter(task => {

            return JSON.stringify(task)
              .toLowerCase()
              .includes(keyword);

          });

        renderTable(filtered);

      });


    function showStatusDetail(type){

      let filtered = tasks;

      if(currentTeam !== 'ALL'){

        filtered = filtered.filter(t =>
          t.TEAM === currentTeam
        );

      }

      if(type === 'INPROGRESS'){

        filtered = filtered.filter(t =>
          t.STATUS === 'Review' ||
          t.STATUS === 'In Progress'
        );

      }else if(type === 'COMPLETED'){

        filtered = filtered.filter(t =>
          t.STATUS === 'Completed'
        );

      }else if(type === 'WAITING'){

        filtered = filtered.filter(t =>
          t.STATUS === 'Waiting' ||
          t.STATUS === 'Blocked'
        );

      }

      const titleMap = {
        ALL:'TOTAL TASKS',
        INPROGRESS:'IN PROGRESS',
        COMPLETED:'COMPLETED',
        WAITING:'WAITING'
      };

      document.getElementById("modalTitle").innerText =
        titleMap[type] + " DETAIL";

      const modalBody =
        document.getElementById("modalBody");

      if(filtered.length === 0){

        modalBody.innerHTML = `
          <div class="detail-card">
            No task found
          </div>
        `;

      }else{

        modalBody.innerHTML =
          filtered.map(task => `

            <div class="detail-card">

              <div class="flex justify-between items-start gap-4">

                <div>

                  <h3 class="text-xl font-bold mb-2" style="color:#0f172a">
                    ${task.TOPIC || '-'}
                  </h3>

                  <p class="text-slate-600">
                    <b>Activity:</b>
                    ${task.ACTIVITY || '-'}
                  </p>

                  <p class="text-slate-600 mt-1">
                    <b>Member:</b>
                    ${task.MEMBER || '-'}
                  </p>

                  <p class="text-slate-600 mt-1">
                    <b>Status:</b>
                    ${task.STATUS || '-'}
                  </p>

                  <p class="text-slate-600 mt-1">
                    <b>Lead Time:</b>
                    ${task["LEAD DAYS"] || 0} Days
                  </p>

                </div>

              </div>

              <div class="detail-note">

                <b>NOTE:</b>
                ${task.NOTE || task.Note || task.note || '-'}

              </div>

            </div>

          `).join('');

      }

      document.getElementById("detailModal").style.display =
        "block";

    }

    function closeModal(){

      document.getElementById("detailModal").style.display =
        "none";

    }

    window.onclick = function(event){

      const modal =
        document.getElementById("detailModal");

      if(event.target === modal){

        closeModal();

      }

    }



    loadData();

    setInterval(loadData, 30000);

  </script>

</body>
</html>
