<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modern Work Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>

    body{
      background:#081120;
      color:white;
      font-family:Arial,sans-serif;
      overflow-x:hidden;
    }

    .glass{
      background:#101c2e;
      border:1px solid #1e293b;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    .sidebar{
      position:fixed;
      left:0;
      top:0;
      width:240px;
      height:100vh;
      background:#0f172a;
      border-right:1px solid #1e293b;
      padding:30px 20px;
      z-index:100;
    }

    .sidebar-title{
      font-size:24px;
      font-weight:bold;
      margin-bottom:30px;
    }

    .menu-btn{
      width:100%;
      background:#172437;
      border:none;
      color:white;
      padding:14px;
      margin-bottom:12px;
      border-radius:14px;
      cursor:pointer;
      transition:0.2s;
      text-align:left;
      font-weight:bold;
    }

    .menu-btn:hover{
      background:#223552;
    }

    .menu-btn.active{
      background:#22d3ee;
      color:#081120;
    }

    .main-content{
      margin-left:240px;
      padding:30px;
    }

    .status-badge{
      padding:6px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:bold;
    }

    .waiting{
      background:rgba(234,179,8,0.2);
      color:#fde047;
    }

    .review{
      background:rgba(59,130,246,0.2);
      color:#93c5fd;
    }

    .blocked{
      background:rgba(239,68,68,0.2);
      color:#fca5a5;
    }

    .completed{
      background:rgba(34,197,94,0.2);
      color:#86efac;
    }

    .chart-bar{
      height:10px;
      border-radius:999px;
      background:#22d3ee;
    }

    table{
      border-collapse:separate;
      border-spacing:0 12px;
    }

    tbody tr{
      background:#172437;
      transition:0.2s;
    }

    tbody tr:hover{
      background:#20314d;
    }

    
    .clickable-card{
      cursor:pointer;
      transition:0.25s;
    }

    .clickable-card:hover{
      transform:translateY(-4px);
      border-color:#22d3ee;
    }

    .modal{
      display:none;
      position:fixed;
      z-index:9999;
      left:0;
      top:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.75);
      padding:20px;
    }

    .modal-content{
      background:#101c2e;
      width:90%;
      max-width:900px;
      margin:40px auto;
      border-radius:24px;
      border:1px solid #1e293b;
      padding:24px;
      max-height:85vh;
      overflow-y:auto;
      color:white;
      box-shadow:0 10px 40px rgba(0,0,0,0.5);
    }

    .modal-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .close-modal{
      font-size:32px;
      cursor:pointer;
      color:#94a3b8;
    }

    .close-modal:hover{
      color:white;
    }

    .detail-card{
      background:#172437;
      border:1px solid #24344d;
      border-radius:18px;
      padding:18px;
      margin-bottom:14px;
    }

    .detail-note{
      margin-top:10px;
      color:#fde047;
      background:rgba(234,179,8,0.12);
      padding:10px;
      border-radius:12px;
    }


    @media(max-width:1024px){

      .sidebar{
        width:100%;
        height:auto;
        position:relative;
      }

      .main-content{
        margin-left:0;
      }

    }

  </style>

</head>

<body>

  <!-- SIDEBAR -->

  <div class="sidebar">

    <div class="sidebar-title">
      WORK DASHBOARD
    </div>

    <button class="menu-btn active" onclick="filterTeam('ALL', this)">
      📊 Overview
    </button>

    <button class="menu-btn" onclick="filterTeam('BOSS', this)">
      🐯 BOSS
    </button>

    <button class="menu-btn" onclick="filterTeam('BUS', this)">
      🚌 BUS
    </button>

    <button class="menu-btn" onclick="filterTeam('NING', this)">
      🐋 NING
    </button>

    <button class="menu-btn" onclick="filterTeam('NON', this)">
      🐱 NON
    </button>

  </div>

  <!-- MAIN -->

  <div class="main-content">

    <!-- HEADER -->

    <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-4">

      <div>

        <h1 id="dashboardTitle" class="text-4xl font-bold">
          WORK STATUS DASHBOARD
        </h1>

        <p class="text-slate-400 mt-2">
          Production & Engineering Task Tracking
        </p>

      </div>

      <div class="glass rounded-2xl px-5 py-3">

        <p class="text-slate-400 text-sm">
          Last Update
        </p>

        <p id="lastUpdate" class="font-semibold"></p>

      </div>

    </div>

    <!-- KPI -->

    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-5 mb-8">

      <div class="glass rounded-3xl p-6 clickable-card" onclick="showStatusDetail('ALL')">

        <p class="text-slate-400 text-sm">
          TOTAL TASKS
        </p>

        <h2 id="totalTask" class="text-5xl font-bold mt-4">
          0
        </h2>

      </div>

      <div class="glass rounded-3xl p-6 clickable-card" onclick="showStatusDetail('INPROGRESS')">

        <p class="text-slate-400 text-sm">
          IN PROGRESS
        </p>

        <h2 id="inProgress" class="text-5xl font-bold mt-4">
          0
        </h2>

      </div>

      <div class="glass rounded-3xl p-6 clickable-card" onclick="showStatusDetail('COMPLETED')">

        <p class="text-slate-400 text-sm">
          COMPLETED
        </p>

        <h2 id="completed" class="text-5xl font-bold mt-4">
          0
        </h2>

      </div>

      <div class="glass rounded-3xl p-6 clickable-card" onclick="showStatusDetail('WAITING')">

        <p class="text-slate-400 text-sm">
          WAITING
        </p>

        <h2 id="waiting" class="text-5xl font-bold mt-4">
          0
        </h2>

      </div>

    </div>

    <!-- MAIN GRID -->

    <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">

      <!-- TABLE -->

      <div class="xl:col-span-2 glass rounded-3xl p-6">

        <div class="flex justify-between items-center mb-6">

          <h2 class="text-2xl font-semibold">
            Task Overview
          </h2>

          <input
            type="text"
            id="searchInput"
            placeholder="Search..."
            class="bg-slate-800 border border-slate-700 rounded-xl px-4 py-2 outline-none"
          />

        </div>

        <div class="overflow-x-auto">

          <table class="w-full">

            <thead>

              <tr class="text-slate-400 text-sm text-left">

                  <th class="pb-3">TOPIC</th>
                  <th class="pb-3">ACTIVITY</th>
                  <th class="pb-3">MEMBER</th>
                  <th class="pb-3">START</th>
                  <th class="pb-3">END</th>
                  <th class="pb-3">LEADTIME</th>
                  <th class="pb-3">STATUS</th>

              </tr>

            </thead>

            <tbody id="taskTable"></tbody>

          </table>

        </div>

      </div>

      <!-- SIDE -->

      <div class="space-y-6">

        <!-- WORKLOAD -->

        <div class="glass rounded-3xl p-6">

          <h2 class="text-xl font-semibold mb-6">
            Team Workload
          </h2>

          <div id="workloadContainer" class="space-y-5"></div>

        </div>

        <!-- STATUS -->

        <div class="glass rounded-3xl p-6">

          <h2 class="text-xl font-semibold mb-5">
            Status Summary
          </h2>

          <div id="statusSummary" class="space-y-4"></div>

        </div>

      </div>

    </div>

  </div>

  
  <!-- DETAIL MODAL -->

  <div id="detailModal" class="modal">

    <div class="modal-content">

      <div class="modal-header">

        <h2 id="modalTitle" class="text-3xl font-bold">
          TASK DETAIL
        </h2>

        <span class="close-modal" onclick="closeModal()">
          &times;
        </span>

      </div>

      <div id="modalBody"></div>

    </div>

  </div>


  <script>

    const API_URL =
      "https://script.google.com/macros/s/AKfycbxVfyD_YfCHLNbrokqUflFZUs4mz6_76et9AVJlhOV9htMlnxQ8rezq_1rhF_7tPjc4/exec";

    let tasks = [];

    let currentTeam = 'ALL';

async function loadData(){

  try{

    const response =
      await fetch(API_URL);

    const json =
      await response.json();

    console.log(json);

    // IMPORTANT
    tasks = json.data || [];

    renderCurrentView();

  }catch(error){

    console.error("LOAD ERROR:", error);

  }
}

    function renderCurrentView(){

      let filtered = tasks;

      if(currentTeam !== 'ALL'){

        filtered =
          tasks.filter(t => t.TEAM === currentTeam);

      }

      renderDashboard(filtered);

      document.getElementById("dashboardTitle").innerText =
        currentTeam === 'ALL'
        ? 'WORK STATUS DASHBOARD'
        : `${currentTeam} DASHBOARD`;

    }

    function filterTeam(team, button){

      currentTeam = team;

      document
        .querySelectorAll('.menu-btn')
        .forEach(btn => btn.classList.remove('active'));

      button.classList.add('active');

      renderCurrentView();
    }

    function renderDashboard(data){

      document.getElementById("lastUpdate").innerText =
        new Date().toLocaleString();

      const total = data.length;

      const completed =
        data.filter(t => t.STATUS === "Completed").length;

      const waiting =
        data.filter(t =>
          t.STATUS === "Waiting" ||
          t.STATUS === "Blocked"
        ).length;

      const progress =
        data.filter(t =>
          t.STATUS === "Review" ||
          t.STATUS === "In Progress"
        ).length;

      document.getElementById("totalTask").innerText = total;
      document.getElementById("completed").innerText = completed;
      document.getElementById("waiting").innerText = waiting;
      document.getElementById("inProgress").innerText = progress;

      renderTable(data);
      renderWorkload(data);
      renderStatus(data);
    }

    function renderTable(data){

  const table =
    document.getElementById("taskTable");

  table.innerHTML = "";

  data.forEach(task => {

    const displayStatus =
      task.STATUS === "Blocked"
      ? "Waiting"
      : task.STATUS;

    const statusClass =
      displayStatus === "Waiting" ? "waiting" :
      displayStatus === "Review" ? "review" :
      "completed";

    table.innerHTML += `
      <tr>

        <td class="py-4 px-3 rounded-l-2xl font-medium">
          ${task.TOPIC || "-"}
        </td>

        <td class="px-3">
          ${task.ACTIVITY || "-"}
        </td>

        <td class="px-3">
          ${task.MEMBER || "-"}
        </td>

        <td class="px-3 text-slate-300 whitespace-nowrap">
          ${task.START || "-"}
        </td>

        <td class="px-3 text-slate-300 whitespace-nowrap">
          ${task.END || "-"}
        </td>

        <td class="px-3">
          ${task["LEAD DAYS"] || 0} Days
        </td>

        <td class="px-3 rounded-r-2xl">

          <span class="status-badge ${statusClass}">
            ${displayStatus || "-"}
          </span>

        </td>

      </tr>
    `;
  });
}
    function renderWorkload(data){

      const workload = {};

      data.forEach(task => {

        const member = task.MEMBER || "Unknown";

        workload[member] =
          (workload[member] || 0) + 1;

      });

      const container =
        document.getElementById("workloadContainer");

      container.innerHTML = "";

      Object.keys(workload).forEach(member => {

        const value = workload[member] * 20;

        container.innerHTML += `

          <div>

            <div class="flex justify-between mb-2">

              <span>${member}</span>

              <span class="text-slate-400">
                ${value}%
              </span>

            </div>

            <div class="w-full h-3 bg-slate-700 rounded-full overflow-hidden">

              <div
                class="chart-bar"
                style="width:${value}%"
              ></div>

            </div>

          </div>

        `;
      });
    }

    function renderStatus(data){

      const statusMap = {
        Waiting: 0,
        Review: 0,
        Completed: 0
      };

      data.forEach(task => {

        const displayStatus =
          task.STATUS === "Blocked"
          ? "Waiting"
          : task.STATUS;

        if(statusMap[displayStatus] !== undefined){

          statusMap[displayStatus]++;

        }

      });

      const colors = {
        Waiting: "bg-yellow-400",
        Review: "bg-blue-400",
        Completed: "bg-green-400"
      };

      const container =
        document.getElementById("statusSummary");

      container.innerHTML = "";

      Object.keys(statusMap).forEach(status => {

        container.innerHTML += `

          <div class="flex justify-between items-center">

            <div class="flex items-center gap-3">

              <div class="w-3 h-3 rounded-full ${colors[status]}"></div>

              <span>${status}</span>

            </div>

            <span class="font-semibold">
              ${statusMap[status]}
            </span>

          </div>

        `;
      });
    }

    // SEARCH

    document
      .getElementById("searchInput")
      .addEventListener("input", function(e){

        const keyword =
          e.target.value.toLowerCase();

        let filtered = tasks;

        if(currentTeam !== 'ALL'){

          filtered =
            filtered.filter(t =>
              t.TEAM === currentTeam);

        }

        filtered =
          filtered.filter(task => {

            return JSON.stringify(task)
              .toLowerCase()
              .includes(keyword);

          });

        renderTable(filtered);

      });


    function showStatusDetail(type){

      let filtered = tasks;

      if(currentTeam !== 'ALL'){

        filtered = filtered.filter(t =>
          t.TEAM === currentTeam
        );

      }

      if(type === 'INPROGRESS'){

        filtered = filtered.filter(t =>
          t.STATUS === 'Review' ||
          t.STATUS === 'In Progress'
        );

      }else if(type === 'COMPLETED'){

        filtered = filtered.filter(t =>
          t.STATUS === 'Completed'
        );

      }else if(type === 'WAITING'){

        filtered = filtered.filter(t =>
          t.STATUS === 'Waiting' ||
          t.STATUS === 'Blocked'
        );

      }

      const titleMap = {
        ALL:'TOTAL TASKS',
        INPROGRESS:'IN PROGRESS',
        COMPLETED:'COMPLETED',
        WAITING:'WAITING'
      };

      document.getElementById("modalTitle").innerText =
        titleMap[type] + " DETAIL";

      const modalBody =
        document.getElementById("modalBody");

      if(filtered.length === 0){

        modalBody.innerHTML = `
          <div class="detail-card">
            No task found
          </div>
        `;

      }else{

        modalBody.innerHTML =
          filtered.map(task => `

            <div class="detail-card">

              <div class="flex justify-between items-start gap-4">

                <div>

                  <h3 class="text-xl font-bold mb-2">
                    ${task.TOPIC || '-'}
                  </h3>

                  <p class="text-slate-300">
                    <b>Activity:</b>
                    ${task.ACTIVITY || '-'}
                  </p>

                  <p class="text-slate-300 mt-1">
                    <b>Member:</b>
                    ${task.MEMBER || '-'}
                  </p>

                  <p class="text-slate-300 mt-1">
                    <b>Status:</b>
                    ${task.STATUS || '-'}
                  </p>

                  <p class="text-slate-300 mt-1">
                    <b>Lead Time:</b>
                    ${task["LEAD DAYS"] || 0} Days
                  </p>

                </div>

              </div>

              <div class="detail-note">

                <b>NOTE:</b>
                ${task.NOTE || task.Note || task.note || '-'}

              </div>

            </div>

          `).join('');

      }

      document.getElementById("detailModal").style.display =
        "block";

    }

    function closeModal(){

      document.getElementById("detailModal").style.display =
        "none";

    }

    window.onclick = function(event){

      const modal =
        document.getElementById("detailModal");

      if(event.target === modal){

        closeModal();

      }

    }



    loadData();

    setInterval(loadData, 30000);

  </script>

</body>
</html>
